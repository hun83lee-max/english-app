<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DEPARTURES · 상황별 영어회화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0F2038;
    --navy-2: #16304F;
    --navy-3: #1D3D61;
    --ink: #081222;
    --amber: #FFC857;
    --amber-dim: #B98F3E;
    --teal: #35A08F;
    --coral: #E8654A;
    --paper: #F3EEE2;
    --paper-dim: #C7C2B4;
    --line: rgba(243,238,226,0.14);
    --radius: 14px;
    --shadow: 0 18px 40px rgba(4,10,20,0.45);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a3a5c 0%, transparent 60%),
      var(--navy);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app{ max-width: 480px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; position:relative; }

  /* ---------- Header / board ---------- */
  header.board{
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index: 5;
    background: linear-gradient(180deg, var(--navy) 80%, transparent);
    backdrop-filter: blur(6px);
  }
  .board-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .board-title{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--amber);
    line-height:1;
    text-transform: uppercase;
  }
  .board-title .flicker{ display:inline-block; }
  .board-clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--paper-dim);
    letter-spacing: 1px;
    text-align:right;
  }
  .board-sub{
    margin-top:6px;
    font-size: 13px;
    color: var(--paper-dim);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* ---------- Home: departure rows ---------- */
  main{ flex:1; padding: 6px 14px 40px; }
  .col-labels{
    display:grid;
    grid-template-columns: 52px 1fr 78px 96px;
    padding: 14px 10px 8px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--paper-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .row{
    display:grid;
    grid-template-columns: 52px 1fr 78px 96px;
    align-items:center;
    padding: 14px 10px;
    border-bottom: 1px solid var(--line);
    cursor:pointer;
    background: transparent;
    transition: background 0.15s ease;
  }
  .row:active{ background: rgba(255,200,87,0.08); }
  .row-code{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size: 15px;
    color: var(--amber);
    letter-spacing: 1px;
  }
  .row-title{ min-width:0; padding-right:6px; }
  .row-title .en{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:700;
    font-size: 19px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--paper);
    line-height:1.15;
  }
  .row-title .kr{ font-size: 12.5px; color: var(--paper-dim); margin-top:2px; }
  .row-seats{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--paper-dim);
    text-align:center;
  }
  .row-status{ text-align:right; }
  .status-pill{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    white-space:nowrap;
  }
  .status-wait{ background: rgba(199,194,180,0.12); color: var(--paper-dim); }
  .status-boarding{ background: rgba(255,200,87,0.16); color: var(--amber); }
  .status-done{ background: rgba(53,160,143,0.18); color: var(--teal); }

  footer.hint{
    padding: 22px 24px 10px;
    font-size: 12px;
    color: var(--paper-dim);
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    line-height:1.6;
  }

  /* ---------- Detail (boarding pass) ---------- */
  .view{ display:none; }
  .view.active{ display:block; }

  .pass{
    margin: 16px 14px 0;
    background: var(--navy-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow:hidden;
    border: 1px solid var(--line);
  }
  .pass-head{
    padding: 18px 18px 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    gap: 10px;
  }
  .pass-head .en{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size: 26px;
    color: var(--amber);
    text-transform:uppercase;
    line-height:1.05;
  }
  .pass-head .kr{ color: var(--paper-dim); font-size: 13px; margin-top:4px; }
  .pass-code{
    font-family:'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight:600;
    color: var(--paper);
    text-align:right;
  }
  .perforation{
    position:relative;
    height:1px;
    background: repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 16px);
    margin: 0 18px;
  }
  .pass-meta{
    display:flex; justify-content:space-between;
    padding: 12px 18px 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--paper-dim);
    letter-spacing: 0.5px;
  }

  .backbar{
    display:flex; align-items:center; gap:10px;
    padding: 16px 14px 0;
  }
  .backbtn{
    background:none; border:1px solid var(--line); color: var(--paper);
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    padding: 7px 12px; border-radius: 8px; cursor:pointer;
    letter-spacing: 0.5px;
  }
  .backbtn:active{ background: rgba(255,255,255,0.06); }

  .section-label{
    margin: 26px 18px 10px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform:uppercase;
    color: var(--amber-dim);
  }

  .phrase-card{
    margin: 0 14px 10px;
    background: var(--navy-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 14px;
    display:flex;
    justify-content:space-between;
    gap: 10px;
    align-items:center;
  }
  .phrase-card .txt{ min-width:0; }
  .phrase-card .en{ font-size: 16px; font-weight:600; color: var(--paper); line-height:1.35; }
  .phrase-card .kr{ font-size: 13px; color: var(--paper-dim); margin-top:4px; }
  .phrase-card .tip{ font-size:11.5px; color: var(--teal); margin-top:6px; font-family:'IBM Plex Mono', monospace;}
  .speak-btn{
    flex-shrink:0;
    width: 38px; height:38px; border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--navy-3);
    color: var(--amber);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 16px;
  }
  .speak-btn:active{ background: var(--amber); color: var(--ink); }

  .dialogue{ margin: 0 14px 10px; }
  .bubble{
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 14px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height:1.4;
  }
  .bubble .kr{ font-size:12px; color: rgba(255,255,255,0.55); margin-top:3px;}
  .bubble.a{
    background: var(--navy-3);
    border-bottom-left-radius: 4px;
    margin-right: auto;
  }
  .bubble.b{
    background: var(--amber);
    color: var(--ink);
    border-bottom-right-radius: 4px;
    margin-left: auto;
  }
  .bubble.b .kr{ color: rgba(8,18,34,0.6); }

  .cta-row{ padding: 18px 14px 34px; }
  .cta{
    display:block; width:100%;
    background: var(--amber); color: var(--ink);
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800; font-size: 18px; letter-spacing: 1px;
    text-transform:uppercase;
    border:none; border-radius: 12px;
    padding: 15px 0;
    cursor:pointer;
  }
  .cta:active{ transform: translateY(1px); }

  /* ---------- Quiz ---------- */
  .quiz-wrap{ padding: 18px 14px 40px; }
  .quiz-progress{
    height: 5px; background: var(--navy-3); border-radius: 3px; overflow:hidden; margin-bottom: 22px;
  }
  .quiz-progress > div{ height:100%; background: var(--teal); width:0%; transition: width .25s ease; }

  .flash{
    background: var(--navy-2);
    border: 1px solid var(--line);
    border-radius: 18px;
    min-height: 220px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 30px 22px;
    cursor:pointer;
    box-shadow: var(--shadow);
  }
  .flash .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 2px; color: var(--paper-dim);
    text-transform:uppercase; margin-bottom: 14px;
  }
  .flash .main{
    font-size: 22px; font-weight:700; line-height:1.4; color: var(--paper);
  }
  .flash .reveal{
    margin-top: 16px; font-size: 16px; color: var(--amber); font-weight:600;
    display:none;
  }
  .flash.flipped .reveal{ display:block; }
  .flash .tap-hint{
    margin-top: 18px; font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--paper-dim);
  }

  .quiz-actions{
    display:flex; gap: 10px; margin-top: 18px;
  }
  .qbtn{
    flex:1; padding: 14px 0; border-radius: 12px; border:none;
    font-family:'Big Shoulders Display', sans-serif; font-weight:700; font-size:15px;
    letter-spacing: 0.5px; text-transform:uppercase; cursor:pointer;
  }
  .qbtn.no{ background: rgba(232,101,74,0.16); color: var(--coral); }
  .qbtn.yes{ background: rgba(53,160,143,0.18); color: var(--teal); }
  .qbtn:disabled{ opacity: 0.35; }

  .quiz-done{ text-align:center; padding: 40px 10px; }
  .quiz-done .big{
    font-family:'Big Shoulders Display', sans-serif; font-size: 30px; color: var(--amber); font-weight:800;
  }
  .quiz-done p{ color: var(--paper-dim); font-size: 14px; margin-top: 10px; }

  ::selection{ background: var(--amber); color: var(--ink); }

  /* ---------- Speaking practice ---------- */
  .btn-row{ display:flex; gap:8px; flex-shrink:0; }
  .mic-btn{
    flex-shrink:0;
    width: 38px; height:38px; border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--navy-3);
    color: var(--coral);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 15px;
  }
  .mic-btn.listening{
    background: var(--coral); color: var(--ink);
    animation: pulse 1s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 0 rgba(232,101,74,0.5); }
    50%{ box-shadow: 0 0 0 8px rgba(232,101,74,0); }
  }
  .speak-feedback{
    margin: -2px 14px 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--navy-3);
    border: 1px solid var(--line);
    font-size: 13px;
    display:none;
  }
  .speak-feedback.show{ display:block; }
  .speak-feedback .verdict{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 1px; text-transform:uppercase;
    margin-bottom: 6px;
  }
  .speak-feedback .verdict.good{ color: var(--teal); }
  .speak-feedback .verdict.bad{ color: var(--coral); }
  .speak-feedback .heard{ color: var(--paper-dim); line-height:1.5; }
  .diff-word{ padding: 0 1px; border-radius: 3px; }
  .diff-word.ok{ color: var(--paper); }
  .diff-word.miss{ color: var(--coral); text-decoration: line-through; opacity:0.8; }
  .type-row{ display:flex; gap:8px; margin: 0 14px 12px; }
  .type-input{
    flex:1; background: var(--navy-3); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; color: var(--paper);
    font-size: 14px; font-family:'Inter', sans-serif;
  }
  .type-input:focus{ outline: none; border-color: var(--amber); }
  .check-btn{
    flex-shrink:0; background: var(--amber); color: var(--ink); border:none;
    border-radius: 10px; padding: 0 16px; font-weight:700; cursor:pointer;
    font-family:'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.5px;
  }
  .no-support{
    margin: 0 14px 14px; padding: 12px 14px; border-radius: 10px;
    background: rgba(232,101,74,0.1); border: 1px solid rgba(232,101,74,0.3);
    font-size: 12.5px; color: var(--paper-dim); font-family:'IBM Plex Mono', monospace; line-height:1.6;
  }

  /* ---------- Roleplay entry ---------- */
  .roleplay-cta{
    margin: 4px 14px 24px;
    padding: 18px 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,200,87,0.14), rgba(53,160,143,0.10));
    border: 1px solid rgba(255,200,87,0.35);
    display:flex; align-items:center; gap:14px;
    cursor:pointer;
  }
  .roleplay-cta .icon{ font-size: 28px; flex-shrink:0; }
  .roleplay-cta .txt .title{
    font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:18px;
    color: var(--amber); text-transform:uppercase; letter-spacing:0.5px; line-height:1.1;
  }
  .roleplay-cta .txt .sub{ font-size:12.5px; color: var(--paper-dim); margin-top:3px; }

  /* ---------- Character badge cards ---------- */
  .crew-grid{ padding: 6px 14px 30px; display:flex; flex-direction:column; gap:12px; }
  .crew-card{
    display:flex; align-items:center; gap:14px;
    background: var(--navy-2); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; cursor:pointer;
  }
  .crew-card:active{ background: var(--navy-3); }
  .avatar-badge{
    flex-shrink:0; width:64px; height:64px; border-radius: 14px;
    background: var(--navy-3); border: 1px solid var(--line); overflow:hidden;
  }
  .avatar-badge svg{ width:100%; height:100%; display:block; }
  .crew-info .name{ font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:19px; color:var(--paper); letter-spacing:0.3px; }
  .crew-info .role{ font-size:12.5px; color: var(--amber-dim); font-family:'IBM Plex Mono', monospace; margin-top:2px; }
  .crew-info .desc{ font-size:12px; color: var(--paper-dim); margin-top:4px; line-height:1.4; }
  .crew-tag{
    margin-left:auto; flex-shrink:0;
    font-family:'IBM Plex Mono', monospace; font-size:10px; color: var(--paper-dim);
    border: 1px solid var(--line); padding: 3px 7px; border-radius:6px;
  }

  /* ---------- Scene intro ---------- */
  .scene-intro{ padding: 4px 14px 30px; }
  .scene-hero{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding: 30px 20px 24px;
    background: var(--navy-2); border:1px solid var(--line); border-radius:18px;
    margin-bottom: 18px;
  }
  .scene-hero .avatar-big{ width:110px; height:110px; border-radius:50%; overflow:hidden; border:3px solid var(--amber); margin-bottom:14px; }
  .scene-hero .avatar-big svg{ width:100%; height:100%; display:block; }
  .scene-hero .name{ font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:24px; color:var(--paper); }
  .scene-hero .role{ font-size:13px; color:var(--amber-dim); font-family:'IBM Plex Mono', monospace; margin-top:2px; }
  .scene-hero .scenario{ margin-top:14px; font-size:14px; color:var(--paper-dim); line-height:1.6; max-width: 320px; }

  /* ---------- Roleplay chat ---------- */
  .rp-chat{ padding: 4px 14px 20px; }
  .rp-row{ display:flex; gap:10px; margin-bottom:16px; align-items:flex-end; }
  .rp-row.user{ flex-direction:row-reverse; }
  .rp-avatar{ width:36px; height:36px; border-radius:50%; overflow:hidden; flex-shrink:0; border:1px solid var(--line); }
  .rp-avatar svg{ width:100%; height:100%; display:block; }
  .rp-avatar.you{ background: var(--amber); display:flex; align-items:center; justify-content:center; font-size:16px; }
  .rp-bubble{ max-width: 74%; }
  .rp-bubble .line{
    background: var(--navy-2); border:1px solid var(--line); border-radius:14px; border-bottom-left-radius:4px;
    padding:10px 13px; font-size:14.5px; line-height:1.45; color:var(--paper);
  }
  .rp-row.user .rp-bubble .line{
    background: var(--amber); color: var(--ink); border-bottom-left-radius:14px; border-bottom-right-radius:4px;
  }
  .rp-bubble .kr{ font-size:12px; color:var(--paper-dim); margin-top:4px; }
  .rp-bubble .kr.you{ text-align:right; }

  .rp-prompt{
    background: var(--navy-2); border:1px solid var(--amber-dim); border-radius:16px;
    padding: 16px 16px 14px; margin: 4px 0 20px;
  }
  .rp-prompt .label{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
  .rp-prompt .kr-target{ font-size:16px; color:var(--paper); line-height:1.5; margin-bottom:4px; }
  .rp-prompt .hint{ font-size:12px; color:var(--paper-dim); margin-bottom:12px; }
  .rp-mic-row{ display:flex; justify-content:center; }
  .rp-mic-row .mic-btn{ width:56px; height:56px; font-size:22px; }
  .rp-skip{ text-align:center; margin-top:12px; }
  .rp-skip button{
    background:none; border:none; color: var(--paper-dim); font-family:'IBM Plex Mono', monospace;
    font-size:12px; text-decoration:underline; cursor:pointer;
  }

  .rp-summary{ text-align:center; padding: 30px 16px; }
  .rp-summary .avatar-big{ width:90px; height:90px; border-radius:50%; overflow:hidden; margin: 0 auto 16px; border:3px solid var(--teal); }
  .rp-summary .avatar-big svg{ width:100%; height:100%; display:block; }
  .rp-summary .score{ font-family:'Big Shoulders Display', sans-serif; font-size:34px; color:var(--amber); font-weight:800; }
  .rp-summary p{ color:var(--paper-dim); font-size:13.5px; margin-top:8px; line-height:1.6; }
</style>
</head>
<body>
<div class="app">

  <header class="board">
    <div class="board-top">
      <div class="board-title" id="headerTitle">DEPARTURES</div>
      <div class="board-clock" id="clock">--:--</div>
    </div>
    <div class="board-sub" id="headerSub">상황별 영어회화 · 중급</div>
  </header>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <main>
      <div class="col-labels">
        <span>GATE</span><span>DESTINATION</span><span style="text-align:center">SEATS</span><span style="text-align:right">STATUS</span>
      </div>
      <div id="rows"></div>
    </main>
    <div class="roleplay-cta" id="roleplayCta">
      <div class="icon">🎭</div>
      <div class="txt">
        <div class="title">Talk to a Local</div>
        <div class="sub">가상 인물과 실제 대화하듯 롤플레이 연습하기</div>
      </div>
    </div>
    <footer class="hint">TAP A DESTINATION TO BOARD · 표현을 익히고 연습 모드로 확인하세요</footer>
  </div>

  <!-- CHARACTER LIST VIEW -->
  <div class="view" id="view-characters">
    <div class="backbar"><button class="backbtn" onclick="goHome()">← BOARD</button></div>
    <div class="section-label">캐스팅 · CHOOSE SOMEONE TO TALK TO</div>
    <div class="crew-grid" id="crewGrid"></div>
  </div>

  <!-- SCENE INTRO VIEW -->
  <div class="view" id="view-scene-intro">
    <div class="backbar"><button class="backbtn" onclick="showView('view-characters')">← CAST</button></div>
    <div class="scene-intro" id="sceneIntroBody"></div>
  </div>

  <!-- ROLEPLAY VIEW -->
  <div class="view" id="view-roleplay">
    <div class="backbar"><button class="backbtn" onclick="exitRoleplay()">← CAST</button></div>
    <div class="quiz-progress" style="margin:16px 14px 0;"><div id="rpBar"></div></div>
    <div class="rp-chat" id="rpChat"></div>
    <div id="rpPromptArea"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="backbar"><button class="backbtn" onclick="goHome()">← BOARD</button></div>
    <div class="pass" id="passHead"></div>
    <div class="section-label">핵심 표현 · KEY PHRASES</div>
    <div id="phraseList"></div>
    <div class="section-label">실전 대화 · SAMPLE DIALOGUE</div>
    <div class="dialogue" id="dialogueList"></div>
    <div class="cta-row"><button class="cta" id="startQuizBtn">연습 모드 시작</button></div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="view" id="view-quiz">
    <div class="backbar"><button class="backbtn" onclick="exitQuiz()">← BOARD</button></div>
    <div class="quiz-wrap">
      <div class="quiz-progress"><div id="quizBar"></div></div>
      <div id="quizBody"></div>
    </div>
  </div>

</div>

/* ---------------- STATE ---------------- */
const STORAGE_KEY = 'phrasebook_progress_v1';
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
}
let progress = loadProgress(); // { [catId]: { [phraseIndex]: true } }

let currentCat = null;
let quizQueue = [];
let quizIndex = 0;
let quizKnownCount = 0;

/* ---------------- CLOCK ---------------- */
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `LOCAL ${hh}:${mm}`;
}
tickClock(); setInterval(tickClock, 15000);

/* ---------------- HOME RENDER ---------------- */
function catProgress(cat){
  const p = progress[cat.id] || {};
  const known = Object.keys(p).filter(k => p[k]).length;
  return { known, total: cat.phrases.length };
}
function statusInfo(cat){
  const {known, total} = catProgress(cat);
  if(known === 0) return {label:'탑승 대기', cls:'status-wait'};
  if(known >= total) return {label:'탑승 완료', cls:'status-done'};
  return {label:'탑승 중', cls:'status-boarding'};
}
function renderHome(){
  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const {known, total} = catProgress(cat);
    const st = statusInfo(cat);
    const row = document.createElement('div');
    row.className = 'row';
    row.onclick = () => openCategory(cat.id);
    row.innerHTML = `
      <div class="row-code">${cat.code}</div>
      <div class="row-title">
        <div class="en">${cat.en}</div>
        <div class="kr">${cat.kr}</div>
      </div>
      <div class="row-seats">${known}/${total}</div>
      <div class="row-status"><span class="status-pill ${st.cls}">${st.label}</span></div>
    `;
    rows.appendChild(row);
  });
}

/* ---------------- TTS ---------------- */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

/* ---------------- SPEECH RECOGNITION (speaking practice) ---------------- */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
function recognitionSupported(){ return !!SpeechRecognitionAPI && window.isSecureContext; }

function normalizeWords(text){
  return text.toLowerCase()
    .replace(/[.,!?;:'"""]/g, '')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
}

function scoreAndDiff(target, heard){
  const targetWords = normalizeWords(target);
  const heardWords = new Set(normalizeWords(heard));
  let matched = 0;
  const spans = targetWords.map(w => {
    const ok = heardWords.has(w);
    if(ok) matched++;
    return `<span class="diff-word ${ok ? 'ok' : 'miss'}">${w}</span>`;
  });
  const score = targetWords.length ? Math.round((matched/targetWords.length)*100) : 0;
  return { score, html: spans.join(' ') };
}

function practiceSpeaking(targetText, btnEl, feedbackEl, onDone){
  feedbackEl.classList.add('show');
  if(!window.isSecureContext){
    feedbackEl.innerHTML = `<div class="verdict bad">HTTPS 필요</div><div class="heard">이 페이지가 저장된 파일(content:// 또는 file://)로 열려 있어서 마이크를 쓸 수 없어요. 링크를 눌러서 직접 열어주세요 (다운로드하지 말고).</div>`;
    return;
  }
  if(!SpeechRecognitionAPI){
    feedbackEl.innerHTML = `<div class="verdict bad">지원 안 됨</div><div class="heard">이 브라우저는 음성 인식을 지원하지 않아요. Android는 Chrome, iPhone은 Safari 최신 버전을 사용해보세요.</div>`;
    return;
  }
  if(btnEl.classList.contains('listening')) return;

  const recognition = new SpeechRecognitionAPI();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  btnEl.classList.add('listening');
  feedbackEl.innerHTML = `<div class="verdict" style="color:var(--paper-dim)">LISTENING…</div><div class="heard">지금 영어로 말해보세요.</div>`;

  recognition.onresult = (event) => {
    const heard = event.results[0][0].transcript;
    const { score, html } = scoreAndDiff(targetText, heard);
    const good = score >= 70;
    feedbackEl.innerHTML = `
      <div class="verdict ${good ? 'good' : 'bad'}">${good ? '잘했어요 · ' : '다시 시도해보세요 · '}${score}%</div>
      <div class="heard">인식된 문장: "${heard}"</div>
      <div style="margin-top:6px;">${html}</div>
    `;
    if(typeof onDone === 'function') onDone(score);
  };
  recognition.onerror = (event) => {
    let msg = '음성을 인식하지 못했어요. 다시 시도해주세요.';
    if(event.error === 'not-allowed') msg = '마이크 권한이 차단되어 있어요. 주소창 왼쪽 자물쇠(또는 ⓘ) 아이콘 → 권한에서 마이크를 허용으로 바꿔주세요.';
    if(event.error === 'no-speech') msg = '음성이 감지되지 않았어요. 조금 더 크게 말해보세요.';
    feedbackEl.innerHTML = `<div class="verdict bad">오류</div><div class="heard">${msg}</div>`;
  };
  recognition.onend = () => {
    btnEl.classList.remove('listening');
  };
  recognition.start();
}

/* ---------------- QUIZ ---------------- */
function startQuiz(){
  quizQueue = currentCat.phrases.map((p, i) => ({...p, idx:i}));
  // shuffle
  for(let i = quizQueue.length -1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [quizQueue[i], quizQueue[j]] = [quizQueue[j], quizQueue[i]];
  }
  quizIndex = 0;
  quizKnownCount = 0;
  document.getElementById('headerSub').textContent = currentCat.kr + ' · 연습 모드';
  showView('view-quiz');
  renderQuizCard();
}
function exitQuiz(){
  openCategory(currentCat.id);
}
function renderQuizCard(){
  const bar = document.getElementById('quizBar');
  bar.style.width = Math.round((quizIndex/quizQueue.length)*100) + '%';

  const body = document.getElementById('quizBody');
  if(quizIndex >= quizQueue.length){
    body.innerHTML = `
      <div class="quiz-done">
        <div class="big">${quizKnownCount} / ${quizQueue.length}</div>
        <p>기억한 표현 개수입니다. 다시 연습하거나 목록으로 돌아가세요.</p>
      </div>
      <div class="cta-row" style="padding:0;">
        <button class="cta" onclick="startQuiz()">다시 연습하기</button>
      </div>
    `;
    return;
  }
  const item = quizQueue[quizIndex];
  body.innerHTML = `
    <div class="flash" id="flashCard">
      <div class="eyebrow">이 표현을 영어로 말해보세요</div>
      <div class="main">${item.kr}</div>
      <div class="reveal">${item.en}</div>
      <div class="tap-hint" id="tapHint">TAP CARD TO REVEAL · 또는 🎙️로 바로 말해보기</div>
    </div>
    <div id="quizMicRow" style="margin-top:14px; display:flex; justify-content:center;">
      <button class="mic-btn" id="quizMicBtn" style="width:52px;height:52px;font-size:20px;">🎙️</button>
    </div>
    <div class="speak-feedback" id="quizFeedback"></div>
    <div class="quiz-actions">
      <button class="qbtn no" id="btnNo" disabled>다시 볼게요</button>
      <button class="qbtn yes" id="btnYes" disabled>기억해요</button>
    </div>
  `;
  const card = document.getElementById('flashCard');
  const quizFb = document.getElementById('quizFeedback');
  function reveal(){
    card.classList.add('flipped');
    document.getElementById('btnNo').disabled = false;
    document.getElementById('btnYes').disabled = false;
  }
  card.onclick = () => { reveal(); speak(item.en); };
  document.getElementById('quizMicBtn').onclick = (e) => {
    e.stopPropagation();
    practiceSpeaking(item.en, e.currentTarget, quizFb);
    reveal();
  };
  document.getElementById('btnYes').onclick = () => answer(true, item.idx);
  document.getElementById('btnNo').onclick = () => answer(false, item.idx);
}
function answer(known, phraseIdx){
  if(!progress[currentCat.id]) progress[currentCat.id] = {};
  progress[currentCat.id][phraseIdx] = known;
  saveProgress(progress);
  if(known) quizKnownCount++;
  quizIndex++;
  renderQuizCard();
}

/* ---------------- ROLEPLAY (character conversation) ---------------- */
let currentCharacter = null;
let rpLineIndex = 0;
let rpScores = [];

function renderCrewList(){

function startRoleplay(){
  rpLineIndex = 0;
  rpScores = [];
  document.getElementById('headerSub').textContent = currentCharacter.name + ' · 롤플레이 진행 중';
  document.getElementById('rpChat').innerHTML = '';
  showView('view-roleplay');
  advanceRoleplay();
}

function exitRoleplay(){
  openCharacterIntro(currentCharacter.id);
}

function appendChatBubble(who, en, kr){
  const chat = document.getElementById('rpChat');
  const row = document.createElement('div');
  row.className = 'rp-row ' + (who === 'user' ? 'user' : 'char');
  const avatarHtml = who === 'user'
    ? `<div class="rp-avatar you">🙂</div>`
    : `<div class="rp-avatar">${currentCharacter.avatar}</div>`;
  row.innerHTML = `
    ${avatarHtml}
    <div class="rp-bubble">
      <div class="line">${en}</div>
      <div class="kr ${who === 'user' ? 'you' : ''}">${kr}</div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollIntoView({behavior:'smooth', block:'end'});
}

function advanceRoleplay(){
  const bar = document.getElementById('rpBar');
  bar.style.width = Math.round((rpLineIndex/currentCharacter.lines.length)*100) + '%';

  if(rpLineIndex >= currentCharacter.lines.length){
    renderRoleplaySummary();
    return;
  }
  const line = currentCharacter.lines[rpLineIndex];
  if(line.who === 'char'){
    appendChatBubble('char', line.en, line.kr);
    speak(line.en);
    document.getElementById('rpPromptArea').innerHTML = `
      <div class="cta-row"><button class="cta" id="rpNextBtn">다음</button></div>
    `;
    document.getElementById('rpNextBtn').onclick = () => { rpLineIndex++; advanceRoleplay(); };
  } else {
    document.getElementById('rpPromptArea').innerHTML = `
      <div class="rp-prompt">
        <div class="label">YOUR LINE</div>
        <div class="kr-target">${line.kr}</div>
        <div class="hint">이 뜻을 영어로 말해보세요</div>
        <div class="rp-mic-row"><button class="mic-btn" id="rpMicBtn">🎙️</button></div>
        <div class="speak-feedback" id="rpFeedback"></div>
        <div class="rp-skip"><button id="rpSkipBtn">그냥 넘어가기</button></div>
      </div>
    `;
    const fb = document.getElementById('rpFeedback');
    document.getElementById('rpMicBtn').onclick = (e) => {
      practiceSpeaking(line.en, e.currentTarget, fb, (score) => {
        rpScores.push(score);
        appendChatBubble('user', line.en, line.kr);
        setTimeout(() => { rpLineIndex++; advanceRoleplay(); }, 900);
      });
    };
    document.getElementById('rpSkipBtn').onclick = () => {
      appendChatBubble('user', line.en, line.kr);
      rpLineIndex++;
      advanceRoleplay();
    };
  }
}

function renderRoleplaySummary(){
  document.getElementById('headerSub').textContent = currentCharacter.name + ' · 대화 완료';
  const avg = rpScores.length ? Math.round(rpScores.reduce((a,b)=>a+b,0)/rpScores.length) : 0;
  document.getElementById('rpPromptArea').innerHTML = `
    <div class="rp-summary">
      <div class="avatar-big">${currentCharacter.avatar}</div>
      <div class="score">${avg}%</div>
      <p>${currentCharacter.name}와의 대화를 완주했어요.<br>평균 발음 일치율이에요.</p>
      <div class="cta-row" style="padding:20px 0 0;">
        <button class="cta" onclick="startRoleplay()">다시 대화하기</button>
      </div>
    </div>
  `;
}
