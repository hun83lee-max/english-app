<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DEPARTURES · 상황별 영어회화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0F2038;
    --navy-2: #16304F;
    --navy-3: #1D3D61;
    --ink: #081222;
    --amber: #FFC857;
    --amber-dim: #B98F3E;
    --teal: #35A08F;
    --coral: #E8654A;
    --paper: #F3EEE2;
    --paper-dim: #C7C2B4;
    --line: rgba(243,238,226,0.14);
    --radius: 14px;
    --shadow: 0 18px 40px rgba(4,10,20,0.45);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a3a5c 0%, transparent 60%),
      var(--navy);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app{ max-width: 480px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; position:relative; }

  /* ---------- Header / board ---------- */
  header.board{
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index: 5;
    background: linear-gradient(180deg, var(--navy) 80%, transparent);
    backdrop-filter: blur(6px);
  }
  .board-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .board-title{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--amber);
    line-height:1;
    text-transform: uppercase;
  }
  .board-title .flicker{ display:inline-block; }
  .board-clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--paper-dim);
    letter-spacing: 1px;
    text-align:right;
  }
  .board-sub{
    margin-top:6px;
    font-size: 13px;
    color: var(--paper-dim);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* ---------- Home: departure rows ---------- */
  main{ flex:1; padding: 6px 14px 40px; }
  .col-labels{
    display:grid;
    grid-template-columns: 52px 1fr 78px 96px;
    padding: 14px 10px 8px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--paper-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .row{
    display:grid;
    grid-template-columns: 52px 1fr 78px 96px;
    align-items:center;
    padding: 14px 10px;
    border-bottom: 1px solid var(--line);
    cursor:pointer;
    background: transparent;
    transition: background 0.15s ease;
  }
  .row:active{ background: rgba(255,200,87,0.08); }
  .row-code{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size: 15px;
    color: var(--amber);
    letter-spacing: 1px;
  }
  .row-title{ min-width:0; padding-right:6px; }
  .row-title .en{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:700;
    font-size: 19px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--paper);
    line-height:1.15;
  }
  .row-title .kr{ font-size: 12.5px; color: var(--paper-dim); margin-top:2px; }
  .row-seats{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--paper-dim);
    text-align:center;
  }
  .row-status{ text-align:right; }
  .status-pill{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    white-space:nowrap;
  }
  .status-wait{ background: rgba(199,194,180,0.12); color: var(--paper-dim); }
  .status-boarding{ background: rgba(255,200,87,0.16); color: var(--amber); }
  .status-done{ background: rgba(53,160,143,0.18); color: var(--teal); }

  footer.hint{
    padding: 22px 24px 10px;
    font-size: 12px;
    color: var(--paper-dim);
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    line-height:1.6;
  }

  /* ---------- Detail (boarding pass) ---------- */
  .view{ display:none; }
  .view.active{ display:block; }

  .pass{
    margin: 16px 14px 0;
    background: var(--navy-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow:hidden;
    border: 1px solid var(--line);
  }
  .pass-head{
    padding: 18px 18px 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    gap: 10px;
  }
  .pass-head .en{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size: 26px;
    color: var(--amber);
    text-transform:uppercase;
    line-height:1.05;
  }
  .pass-head .kr{ color: var(--paper-dim); font-size: 13px; margin-top:4px; }
  .pass-code{
    font-family:'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight:600;
    color: var(--paper);
    text-align:right;
  }
  .perforation{
    position:relative;
    height:1px;
    background: repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 16px);
    margin: 0 18px;
  }
  .pass-meta{
    display:flex; justify-content:space-between;
    padding: 12px 18px 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--paper-dim);
    letter-spacing: 0.5px;
  }

  .backbar{
    display:flex; align-items:center; gap:10px;
    padding: 16px 14px 0;
  }
  .backbtn{
    background:none; border:1px solid var(--line); color: var(--paper);
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    padding: 7px 12px; border-radius: 8px; cursor:pointer;
    letter-spacing: 0.5px;
  }
  .backbtn:active{ background: rgba(255,255,255,0.06); }

  .section-label{
    margin: 26px 18px 10px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform:uppercase;
    color: var(--amber-dim);
  }

  .phrase-card{
    margin: 0 14px 10px;
    background: var(--navy-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 14px;
    display:flex;
    justify-content:space-between;
    gap: 10px;
    align-items:center;
  }
  .phrase-card .txt{ min-width:0; }
  .phrase-card .en{ font-size: 16px; font-weight:600; color: var(--paper); line-height:1.35; }
  .phrase-card .kr{ font-size: 13px; color: var(--paper-dim); margin-top:4px; }
  .phrase-card .tip{ font-size:11.5px; color: var(--teal); margin-top:6px; font-family:'IBM Plex Mono', monospace;}
  .speak-btn{
    flex-shrink:0;
    width: 38px; height:38px; border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--navy-3);
    color: var(--amber);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 16px;
  }
  .speak-btn:active{ background: var(--amber); color: var(--ink); }

  .dialogue{ margin: 0 14px 10px; }
  .bubble{
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 14px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height:1.4;
  }
  .bubble .kr{ font-size:12px; color: rgba(255,255,255,0.55); margin-top:3px;}
  .bubble.a{
    background: var(--navy-3);
    border-bottom-left-radius: 4px;
    margin-right: auto;
  }
  .bubble.b{
    background: var(--amber);
    color: var(--ink);
    border-bottom-right-radius: 4px;
    margin-left: auto;
  }
  .bubble.b .kr{ color: rgba(8,18,34,0.6); }

  .cta-row{ padding: 18px 14px 34px; }
  .cta{
    display:block; width:100%;
    background: var(--amber); color: var(--ink);
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800; font-size: 18px; letter-spacing: 1px;
    text-transform:uppercase;
    border:none; border-radius: 12px;
    padding: 15px 0;
    cursor:pointer;
  }
  .cta:active{ transform: translateY(1px); }

  /* ---------- Quiz ---------- */
  .quiz-wrap{ padding: 18px 14px 40px; }
  .quiz-progress{
    height: 5px; background: var(--navy-3); border-radius: 3px; overflow:hidden; margin-bottom: 22px;
  }
  .quiz-progress > div{ height:100%; background: var(--teal); width:0%; transition: width .25s ease; }

  .flash{
    background: var(--navy-2);
    border: 1px solid var(--line);
    border-radius: 18px;
    min-height: 220px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 30px 22px;
    cursor:pointer;
    box-shadow: var(--shadow);
  }
  .flash .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 2px; color: var(--paper-dim);
    text-transform:uppercase; margin-bottom: 14px;
  }
  .flash .main{
    font-size: 22px; font-weight:700; line-height:1.4; color: var(--paper);
  }
  .flash .reveal{
    margin-top: 16px; font-size: 16px; color: var(--amber); font-weight:600;
    display:none;
  }
  .flash.flipped .reveal{ display:block; }
  .flash .tap-hint{
    margin-top: 18px; font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--paper-dim);
  }

  .quiz-actions{
    display:flex; gap: 10px; margin-top: 18px;
  }
  .qbtn{
    flex:1; padding: 14px 0; border-radius: 12px; border:none;
    font-family:'Big Shoulders Display', sans-serif; font-weight:700; font-size:15px;
    letter-spacing: 0.5px; text-transform:uppercase; cursor:pointer;
  }
  .qbtn.no{ background: rgba(232,101,74,0.16); color: var(--coral); }
  .qbtn.yes{ background: rgba(53,160,143,0.18); color: var(--teal); }
  .qbtn:disabled{ opacity: 0.35; }

  .quiz-done{ text-align:center; padding: 40px 10px; }
  .quiz-done .big{
    font-family:'Big Shoulders Display', sans-serif; font-size: 30px; color: var(--amber); font-weight:800;
  }
  .quiz-done p{ color: var(--paper-dim); font-size: 14px; margin-top: 10px; }

  ::selection{ background: var(--amber); color: var(--ink); }

  /* ---------- Speaking practice ---------- */
  .btn-row{ display:flex; gap:8px; flex-shrink:0; }
  .mic-btn{
    flex-shrink:0;
    width: 38px; height:38px; border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--navy-3);
    color: var(--coral);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 15px;
  }
  .mic-btn.listening{
    background: var(--coral); color: var(--ink);
    animation: pulse 1s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 0 rgba(232,101,74,0.5); }
    50%{ box-shadow: 0 0 0 8px rgba(232,101,74,0); }
  }
  .speak-feedback{
    margin: -2px 14px 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--navy-3);
    border: 1px solid var(--line);
    font-size: 13px;
    display:none;
  }
  .speak-feedback.show{ display:block; }
  .speak-feedback .verdict{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 1px; text-transform:uppercase;
    margin-bottom: 6px;
  }
  .speak-feedback .verdict.good{ color: var(--teal); }
  .speak-feedback .verdict.bad{ color: var(--coral); }
  .speak-feedback .heard{ color: var(--paper-dim); line-height:1.5; }
  .diff-word{ padding: 0 1px; border-radius: 3px; }
  .diff-word.ok{ color: var(--paper); }
  .diff-word.miss{ color: var(--coral); text-decoration: line-through; opacity:0.8; }
  .no-support{
    margin: 0 14px 14px; padding: 12px 14px; border-radius: 10px;
    background: rgba(232,101,74,0.1); border: 1px solid rgba(232,101,74,0.3);
    font-size: 12.5px; color: var(--paper-dim); font-family:'IBM Plex Mono', monospace; line-height:1.6;
  }
</style>
</head>
<body>
<div class="app">

  <header class="board">
    <div class="board-top">
      <div class="board-title" id="headerTitle">DEPARTURES</div>
      <div class="board-clock" id="clock">--:--</div>
    </div>
    <div class="board-sub" id="headerSub">상황별 영어회화 · 중급</div>
  </header>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <main>
      <div class="col-labels">
        <span>GATE</span><span>DESTINATION</span><span style="text-align:center">SEATS</span><span style="text-align:right">STATUS</span>
      </div>
      <div id="rows"></div>
    </main>
    <footer class="hint">TAP A DESTINATION TO BOARD · 표현을 익히고 연습 모드로 확인하세요</footer>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="backbar"><button class="backbtn" onclick="goHome()">← BOARD</button></div>
    <div class="pass" id="passHead"></div>
    <div class="section-label">핵심 표현 · KEY PHRASES</div>
    <div id="phraseList"></div>
    <div class="section-label">실전 대화 · SAMPLE DIALOGUE</div>
    <div class="dialogue" id="dialogueList"></div>
    <div class="cta-row"><button class="cta" id="startQuizBtn">연습 모드 시작</button></div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="view" id="view-quiz">
    <div class="backbar"><button class="backbtn" onclick="exitQuiz()">← BOARD</button></div>
    <div class="quiz-wrap">
      <div class="quiz-progress"><div id="quizBar"></div></div>
      <div id="quizBody"></div>
    </div>
  </div>

</div>

<script>
/* ---------------- DATA ---------------- */
const CATEGORIES = [
  {
    id: 'travel', code: 'TRV', gate: '1',
    en: 'Airport & Travel', kr: '공항 · 여행',
    phrases: [
      {en:"I'm here for a connecting flight to Chicago.", kr:"저는 시카고행 환승편을 타려고 합니다.", tip:"환승 카운터에서"},
      {en:"Could you tell me which gate I should head to?", kr:"어느 게이트로 가야 하는지 알려주시겠어요?"},
      {en:"I think my flight got delayed — is that right?", kr:"제 비행기가 지연된 것 같은데, 맞나요?"},
      {en:"Do I need to go through security again after this?", kr:"이후에 보안 검색을 다시 받아야 하나요?"},
      {en:"Is there a shuttle that runs between terminals?", kr:"터미널 사이를 오가는 셔틀이 있나요?"},
      {en:"My luggage hasn't shown up on the carousel yet.", kr:"제 짐이 아직 수하물 컨베이어에 나오지 않았어요."},
      {en:"Could I get an aisle seat if one's available?", kr:"가능하다면 복도 쪽 좌석으로 받을 수 있을까요?"},
      {en:"I'd like to declare this item at customs.", kr:"이 물품을 세관에 신고하고 싶습니다."}
    ],
    dialogue: {
      title:"At the transfer desk",
      lines:[
        {who:'a', en:"Excuse me, I'm running a bit tight on time for my connection.", kr:"실례합니다, 환승 시간이 좀 빠듯해서요."},
        {who:'b', en:"No worries, let me check your next gate right away.", kr:"걱정 마세요, 다음 게이트를 바로 확인해 드릴게요."},
        {who:'a', en:"Thank you — will I need to clear security again?", kr:"감사합니다 — 보안 검색을 다시 받아야 하나요?"},
        {who:'b', en:"Not this time, you're already in the transit area.", kr:"이번엔 아니에요, 이미 환승 구역에 계세요."}
      ]
    }
  },
  {
    id: 'hotel', code: 'HTL', gate: '2',
    en: 'Hotel', kr: '호텔',
    phrases: [
      {en:"I have a reservation under the name Kim.", kr:"김 이름으로 예약했습니다."},
      {en:"Could you have someone help with my bags?", kr:"짐 옮기는 걸 도와주실 분이 계실까요?"},
      {en:"Is breakfast included, and what time does it start?", kr:"조식이 포함되나요, 몇 시부터 시작하나요?"},
      {en:"The air conditioning in my room isn't working.", kr:"제 방 에어컨이 작동하지 않아요."},
      {en:"Could I get a late checkout tomorrow?", kr:"내일 늦은 체크아웃이 가능할까요?"},
      {en:"Is there a fee for using the gym or pool?", kr:"헬스장이나 수영장 이용에 요금이 있나요?"},
      {en:"Could you recommend a quiet place nearby for dinner?", kr:"근처에 조용히 저녁 먹을 만한 곳을 추천해 주시겠어요?"},
      {en:"I'd like to extend my stay by one more night.", kr:"하루 더 묵고 싶습니다."}
    ],
    dialogue: {
      title:"Checking in",
      lines:[
        {who:'a', en:"Hi, checking in — the reservation's under Lee.", kr:"안녕하세요, 체크인하려고요 — 이 이름으로 예약했습니다."},
        {who:'b', en:"Great, I have it right here. Could I see your ID?", kr:"네, 확인됐습니다. 신분증 좀 보여주시겠어요?"},
        {who:'a', en:"Sure. Also, is the room ready already?", kr:"네. 그리고 방은 이미 준비되었나요?"},
        {who:'b', en:"It is — you're all set to head up.", kr:"네, 준비됐습니다 — 바로 올라가시면 됩니다."}
      ]
    }
  },
  {
    id: 'restaurant', code: 'RST', gate: '3',
    en: 'Restaurant & Cafe', kr: '레스토랑 · 카페',
    phrases: [
      {en:"Could we get a table for two, preferably by the window?", kr:"창가 쪽으로 2인석 주실 수 있을까요?"},
      {en:"What would you recommend that's not too spicy?", kr:"너무 맵지 않은 걸로 추천해주실 수 있나요?"},
      {en:"Could we start with some water, please?", kr:"먼저 물 좀 주시겠어요?"},
      {en:"I'm allergic to peanuts — does this dish have any?", kr:"저는 땅콩 알레르기가 있는데, 이 요리에 들어가나요?"},
      {en:"Could you box up the rest for me to take home?", kr:"남은 건 포장해 주시겠어요?"},
      {en:"Could we get separate checks?", kr:"계산을 따로 해주실 수 있나요?"},
      {en:"This isn't quite what I ordered, actually.", kr:"사실 제가 주문한 것과 좀 다른데요."},
      {en:"Do you take reservations for larger groups?", kr:"인원이 많은 경우 예약을 받으시나요?"}
    ],
    dialogue: {
      title:"Ordering coffee",
      lines:[
        {who:'a', en:"Could I get a flat white, and what's your dairy-free option?", kr:"플랫화이트 하나 주시고, 유제품 없는 옵션은 뭐가 있나요?"},
        {who:'b', en:"We've got oat milk, that works well with it.", kr:"귀리 우유가 있어요, 잘 어울려요."},
        {who:'a', en:"Perfect, let's do oat milk then.", kr:"좋아요, 그럼 귀리 우유로 할게요."},
        {who:'b', en:"Sounds good — that'll be ready in a few minutes.", kr:"네, 몇 분 안에 준비될 거예요."}
      ]
    }
  },
  {
    id: 'business', code: 'BIZ', gate: '4',
    en: 'Business Meeting', kr: '비즈니스 미팅',
    phrases: [
      {en:"Thanks for making the time to meet today.", kr:"오늘 시간 내주셔서 감사합니다."},
      {en:"Let's go over the agenda before we dive in.", kr:"본격적으로 시작하기 전에 안건부터 살펴볼게요."},
      {en:"Could you walk us through the numbers on slide three?", kr:"세 번째 슬라이드 수치를 좀 설명해 주시겠어요?"},
      {en:"I see it a bit differently, if I may.", kr:"제 생각은 조금 다른데, 말씀드려도 될까요."},
      {en:"Let's circle back to that point after the break.", kr:"그 부분은 쉬는 시간 이후에 다시 논의하죠."},

/* ---------------- STATE ---------------- */
const STORAGE_KEY = 'phrasebook_progress_v1';
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
}
let progress = loadProgress(); // { [catId]: { [phraseIndex]: true } }

let currentCat = null;
let quizQueue = [];
let quizIndex = 0;
let quizKnownCount = 0;

/* ---------------- CLOCK ---------------- */
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `LOCAL ${hh}:${mm}`;
}
tickClock(); setInterval(tickClock, 15000);

/* ---------------- HOME RENDER ---------------- */
function catProgress(cat){
  const p = progress[cat.id] || {};
  const known = Object.keys(p).filter(k => p[k]).length;
  return { known, total: cat.phrases.length };
}
function statusInfo(cat){
  const {known, total} = catProgress(cat);
  if(known === 0) return {label:'탑승 대기', cls:'status-wait'};
  if(known >= total) return {label:'탑승 완료', cls:'status-done'};
  return {label:'탑승 중', cls:'status-boarding'};
}
function renderHome(){
  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const {known, total} = catProgress(cat);
    const st = statusInfo(cat);
    const row = document.createElement('div');
    row.className = 'row';
    row.onclick = () => openCategory(cat.id);
    row.innerHTML = `
      <div class="row-code">${cat.code}</div>
      <div class="row-title">
        <div class="en">${cat.en}</div>
        <div class="kr">${cat.kr}</div>
      </div>
      <div class="row-seats">${known}/${total}</div>
      <div class="row-status"><span class="status-pill ${st.cls}">${st.label}</span></div>
    `;
    rows.appendChild(row);
  });
}

/* ---------------- NAVIGATION ---------------- */
function showView(id){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){
  document.getElementById('headerTitle').textContent = 'DEPARTURES';
  document.getElementById('headerSub').textContent = '상황별 영어회화 · 중급';
  renderHome();
  showView('view-home');
}
function openCategory(id){
  currentCat = CATEGORIES.find(c => c.id === id);
  document.getElementById('headerTitle').textContent = currentCat.code;
  document.getElementById('headerSub').textContent = currentCat.kr + ' · ' + currentCat.en;

  const {known, total} = catProgress(currentCat);
  document.getElementById('passHead').innerHTML = `
    <div class="pass-head">
      <div>
        <div class="en">${currentCat.en}</div>
        <div class="kr">${currentCat.kr}</div>
      </div>
      <div class="pass-code">${currentCat.code}</div>
    </div>
    <div class="perforation"></div>
    <div class="pass-meta">
      <span>GATE ${currentCat.gate}</span>
      <span>PHRASES ${total}</span>
      <span>LEARNED ${known}</span>
    </div>
  `;

  const list = document.getElementById('phraseList');
  list.innerHTML = '';
  currentCat.phrases.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <div class="txt">
        <div class="en">${p.en}</div>
        <div class="kr">${p.kr}</div>
        ${p.tip ? `<div class="tip">${p.tip}</div>` : ''}
      </div>
      <div class="btn-row">
        <button class="speak-btn" aria-label="발음 듣기">🔊</button>
        <button class="mic-btn" aria-label="말하기 연습">🎙️</button>
      </div>
    `;
    const fb = document.createElement('div');
    fb.className = 'speak-feedback';
    fb.id = 'fb-' + idx;
    card.querySelector('.speak-btn').onclick = (e) => { e.stopPropagation(); speak(p.en); };
    card.querySelector('.mic-btn').onclick = (e) => {
      e.stopPropagation();
      practiceSpeaking(p.en, card.querySelector('.mic-btn'), fb);
    };
    list.appendChild(card);
    list.appendChild(fb);
  });

  const dlist = document.getElementById('dialogueList');
  dlist.innerHTML = `<div class="section-label" style="margin:0 0 10px;">${currentCat.dialogue.title}</div>`;
  currentCat.dialogue.lines.forEach(line => {
    const b = document.createElement('div');
    b.className = 'bubble ' + line.who;
    b.innerHTML = `<div class="en">${line.en}</div><div class="kr">${line.kr}</div>`;
    dlist.appendChild(b);
  });

  document.getElementById('startQuizBtn').onclick = () => startQuiz();
  showView('view-detail');
}

/* ---------------- TTS ---------------- */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

/* ---------------- SPEECH RECOGNITION (speaking practice) ---------------- */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
function recognitionSupported(){ return !!SpeechRecognitionAPI && window.isSecureContext; }

function normalizeWords(text){
  return text.toLowerCase()
    .replace(/[.,!?;:'"""]/g, '')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
}

function scoreAndDiff(target, heard){
  const targetWords = normalizeWords(target);
  const heardWords = new Set(normalizeWords(heard));
  let matched = 0;
  const spans = targetWords.map(w => {
    const ok = heardWords.has(w);
    if(ok) matched++;
    return `<span class="diff-word ${ok ? 'ok' : 'miss'}">${w}</span>`;
  });
  const score = targetWords.length ? Math.round((matched/targetWords.length)*100) : 0;
  return { score, html: spans.join(' ') };
}

function practiceSpeaking(targetText, btnEl, feedbackEl){
  feedbackEl.classList.add('show');
  if(!window.isSecureContext){
    feedbackEl.innerHTML = `<div class="verdict bad">HTTPS 필요</div><div class="heard">마이크를 쓸 수 없는 환경이에요.</div>`;
    return;
  }
  if(!SpeechRecognitionAPI){
    feedbackEl.innerHTML = `<div class="verdict bad">지원 안 됨</div><div class="heard">이 브라우저는 음성 인식을 지원하지 않아요.</div>`;
    return;
  }
  if(btnEl.classList.contains('listening')) return;

  const recognition = new SpeechRecognitionAPI();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  btnEl.classList.add('listening');
  feedbackEl.innerHTML = `<div class="verdict" style="color:var(--paper-dim)">LISTENING…</div><div class="heard">지금 영어로 말해보세요.</div>`;

  recognition.onresult = (event) => {
    const heard = event.results[0][0].transcript;
    const { score, html } = scoreAndDiff(targetText, heard);
    const good = score >= 70;
    feedbackEl.innerHTML = `
      <div class="verdict ${good ? 'good' : 'bad'}">${good ? '잘했어요 · ' : '다시 시도해보세요 · '}${score}%</div>
      <div class="heard">인식된 문장: "${heard}"</div>
      <div style="margin-top:6px;">${html}</div>
    `;
  };
  recognition.onerror = (event) => {
    let msg = '음성을 인식하지 못했어요. 다시 시도해주세요.';
    if(event.error === 'not-allowed') msg = '마이크 권한이 차단되어 있어요. 주소창 왼쪽 자물쇠 아이콘 → 권한에서 마이크를 허용으로 바꿔주세요.';
    if(event.error === 'no-speech') msg = '음성이 감지되지 않았어요. 조금 더 크게 말해보세요.';
    feedbackEl.innerHTML = `<div class="verdict bad">오류</div><div class="heard">${msg}</div>`;
  };
  recognition.onend = () => {
    btnEl.classList.remove('listening');
  };
  recognition.start();
}

/* ---------------- QUIZ ---------------- */
function startQuiz(){
  quizQueue = currentCat.phrases.map((p, i) => ({...p, idx:i}));
  for(let i = quizQueue.length -1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [quizQueue[i], quizQueue[j]] = [quizQueue[j], quizQueue[i]];
  }
  quizIndex = 0;
  quizKnownCount = 0;
  document.getElementById('headerSub').textContent = currentCat.kr + ' · 연습 모드';
  showView('view-quiz');
  renderQuizCard();
}
function exitQuiz(){
  openCategory(currentCat.id);
}
function renderQuizCard(){
  const bar = document.getElementById('quizBar');
  bar.style.width = Math.round((quizIndex/quizQueue.length)*100) + '%';

  const body = document.getElementById('quizBody');
  if(quizIndex >= quizQueue.length){
    body.innerHTML = `
      <div class="quiz-done">
        <div class="big">${quizKnownCount} / ${quizQueue.length}</div>
        <p>기억한 표현 개수입니다. 다시 연습하거나 목록으로 돌아가세요.</p>
      </div>
      <div class="cta-row" style="padding:0;">
        <button class="cta" onclick="startQuiz()">다시 연습하기</button>
      </div>
    `;
    return;
  }
  const item = quizQueue[quizIndex];
  body.innerHTML = `
    <div class="flash" id="flashCard">
      <div class="eyebrow">이 표현을 영어로 말해보세요</div>
      <div class="main">${item.kr}</div>
      <div class="reveal">${item.en}</div>
      <div class="tap-hint" id="tapHint">TAP CARD TO REVEAL · 또는 🎙️로 바로 말해보기</div>
    </div>
    <div id="quizMicRow" style="margin-top:14px; display:flex; justify-content:center;">
      <button class="mic-btn" id="quizMicBtn" style="width:52px;height:52px;font-size:20px;">🎙️</button>
    </div>
    <div class="speak-feedback" id="quizFeedback"></div>
    <div class="quiz-actions">
      <button class="qbtn no" id="btnNo" disabled>다시 볼게요</button>
      <button class="qbtn yes" id="btnYes" disabled>기억해요</button>
    </div>
  `;
  const card = document.getElementById('flashCard');
  const quizFb = document.getElementById('quizFeedback');
  function reveal(){
    card.classList.add('flipped');
    document.getElementById('btnNo').disabled = false;
    document.getElementById('btnYes').disabled = false;
  }
  card.onclick = () => { reveal(); speak(item.en); };
  document.getElementById('quizMicBtn').onclick = (e) => {
    e.stopPropagation();
    practiceSpeaking(item.en, e.currentTarget, quizFb);
    reveal();
  };
  document.getElementById('btnYes').onclick = () => answer(true, item.idx);
  document.getElementById('btnNo').onclick = () => answer(false, item.idx);
}
function answer(known, phraseIdx){
  if(!progress[currentCat.id]) progress[currentCat.id] = {};
  progress[currentCat.id][phraseIdx] = known;
  saveProgress(progress);
  if(known) quizKnownCount++;
  quizIndex++;
  renderQuizCard();
}

/* ---------------- INIT ---------------- */
goHome();
